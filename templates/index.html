<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Clipboard</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    
    <style>
        /* --- Base Styles --- */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 24px; }
        
        button {
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #0056b3; }
        
        input[type="text"] {
            padding: 10px;
            width: calc(100% - 22px);
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .drop-zone {
            border: 2px dashed #007bff;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            margin: 20px 0;
            background-color: #f9f9f9;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .drop-zone.dragover { background-color: #e9ecef; }
        
        .messages {
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 4px;
            background: #fafafa;
        }
        .message-item {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            word-wrap: break-word;
        }

        /* --- Dark Mode Variables --- */
        body.dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        body.dark-mode .container {
            background-color: #1e1e1e;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        body.dark-mode input[type="text"] {
            background-color: #2c2c2c;
            color: #e0e0e0;
            border-color: #444;
        }
        body.dark-mode .drop-zone {
            background-color: #2c2c2c;
            border-color: #007bff;
            color: #e0e0e0;
        }
        body.dark-mode .messages {
            background-color: #2c2c2c;
            border-color: #444;
        }
        body.dark-mode .message-item {
            border-bottom: 1px solid #444;
        }

        /* --- Toast Notification Styles --- */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
        }
        .toast {
            background: #007bff;
            color: #fff;
            padding: 12px 24px;
            margin-top: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            font-weight: bold;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h1>📋 Clipboard</h1>
            <button id="dark-mode-toggle">🌙 Dark Mode</button>
        </div>

        <div id="room-section">
            <input type="text" id="room-input" placeholder="Enter 4-digit Room Code" maxlength="4">
            <button onclick="joinRoom()" style="width: 100%;">Join Room</button>
        </div>

        <div id="clipboard-section" style="display:none;">
            <h3 id="current-room-display" style="text-align: center; color: #007bff;"></h3>
            
            <div class="drop-zone" id="drop-zone">
                📁 Drag & Drop Files Here<br><br><small>Or click to browse</small>
                <input type="file" id="file-input" style="display:none;">
            </div>

            <div style="display: flex; gap: 10px;">
                <input type="text" id="text-input" placeholder="Type or paste text..." style="margin-bottom: 0;">
                <button onclick="sendText()">Send</button>
            </div>

            <div class="messages" id="messages"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const socket = io();
        let currentRoom = '';

        /* --- DOM Elements --- */
        const roomSection = document.getElementById('room-section');
        const clipboardSection = document.getElementById('clipboard-section');
        const currentRoomDisplay = document.getElementById('current-room-display');
        const messagesDiv = document.getElementById('messages');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const roomInput = document.getElementById('room-input');
        const textInput = document.getElementById('text-input');

        /* --- Toast Notification Logic --- */
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.add('show'), 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        /* --- Dark Mode Logic --- */
        const toggleBtn = document.getElementById('dark-mode-toggle');
        
        if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
            toggleBtn.innerText = '☀️ Light Mode';
        }
        
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('dark-mode', isDark);
            toggleBtn.innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
        });

        /* --- Room Connection Logic --- */
        function joinRoom() {
            const roomCode = roomInput.value.trim();
            if (roomCode.length < 1) {
                showToast("Please enter a valid room code.");
                return;
            }
            currentRoom = roomCode;
            socket.emit('join', { room: currentRoom });
            
            roomSection.style.display = 'none';
            clipboardSection.style.display = 'block';
            currentRoomDisplay.innerText = `Connected to Room: ${currentRoom}`;
            showToast(`Successfully joined room ${currentRoom}`);
        }

        /* --- Real-Time Text Logic --- */
        function sendText() {
            const text = textInput.value.trim();
            if (!text) return;
            socket.emit('text_message', { room: currentRoom, data: text });
            textInput.value = '';
        }

        socket.on('receive_text', function(data) {
            const div = document.createElement('div');
            div.className = 'message-item';
            div.innerText = data.data;
            messagesDiv.prepend(div);
        });

        /* --- File Upload Logic (Fetch API) --- */
        function uploadFile(file) {
            if (file.size > 100 * 1024 * 1024) { 
                showToast("File is too large! Maximum allowed size is 100MB.");
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('room', currentRoom);

            showToast("Uploading file...");

            fetch('/api/clipboard', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showToast(data.error);
                } else {
                    showToast("File uploaded successfully!");
                }
            })
            .catch(error => {
                console.error("Upload error:", error);
                showToast("Error uploading file. Please try again.");
            });
        }

        socket.on('receive_file', function(data) {
            const div = document.createElement('div');
            div.className = 'message-item';
            div.innerHTML = `📎 <a href="/download/${currentRoom}/${data.filename}" target="_blank" style="color: #007bff; text-decoration: none; font-weight: bold;">${data.filename}</a>`;
            messagesDiv.prepend(div);
        });

        /* --- Drag & Drop Listeners --- */
        dropZone.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadFile(e.target.files[0]);
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                uploadFile(e.dataTransfer.files[0]);
            }
        });

        /* --- PWA Service Worker Registration --- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker Registered!'))
                    .catch(err => console.log('Service Worker Failed:', err));
            });
        }
    </script>
</body>
</html>
